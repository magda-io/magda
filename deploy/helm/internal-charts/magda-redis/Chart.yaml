  and semantic-search-api
type: application
version: 6.0.0-pr.3646.2
kubeVersion: ">= 1.21.0"
annotations:
  magdaModuleType: "core"
dependencies:
  - name: redis
    version: "17.11.3"
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: global.redis.enabled
