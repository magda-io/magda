apiVersion: apps/v1
kind: Deployment
metadata:
  name: semantic-search-api
spec:
  {{- $global := .Values.global | default dict }}
  {{- $rollingUpdate := get $global "rollingUpdate" | default dict }}
  {{- $searchEngine := get $global "searchEngine" | default dict }}
  {{- $semanticIndexer := get $searchEngine "semanticIndexer" | default dict }}
  {{- $semanticIndexerKnn := get $semanticIndexer "knnVectorFieldConfig" | default dict }}
  {{- $redis := get $global "redis" | default dict }}
  replicas: {{ .Values.replicas | default 1 }}
  strategy:
    rollingUpdate:
      maxUnavailable: {{ get $rollingUpdate "maxUnavailable" | default 0 }}
  selector:
    matchLabels:
      service: semantic-search-api
  template:
    metadata:
      labels:
        service: semantic-search-api
    spec:
{{ if and (.Capabilities.APIVersions.Has "scheduling.k8s.io/v1") (get $global "enablePriorityClass") }}
      priorityClassName: magda-8
{{ end }}
      {{- include "magda.imagePullSecrets" . | indent 6 }}
      containers:
      - name: semantic-search-api
        image: {{ include "magda.image" . | quote }}
        imagePullPolicy: {{ include "magda.imagePullPolicy" . | quote }}
        ports:
          - containerPort: {{ .Values.semanticSearchConfig.listenPort }}
        command:
          - "node"
          - "/usr/src/app/component/dist/index.js"
          - "--listenPort"
          - "{{ .Values.semanticSearchConfig.listenPort }}"
          - "--opensearchApiURL"
          - "{{ .Values.semanticSearchConfig.openSearchUrl }}"
          - "--embeddingApiURL"
          - "{{ .Values.semanticSearchConfig.embeddingApiUrl }}"
          - "--semanticIndexName"
          - "{{ .Values.semanticSearchConfig.semanticIndexName | default (get $semanticIndexer "indexName") }}"
          - "--semanticIndexVersion"
          - "{{ .Values.semanticSearchConfig.semanticIndexVersion | default (get $semanticIndexer "indexVersion") }}"
          - "--semanticIndexerMode"
          - "{{ .Values.semanticSearchConfig.semanticIndexerMode | default (get $semanticIndexerKnn "mode") }}"
          - "--redisHost"
          - '{{ if (get $redis "enabled" | default true) }}{{ .Values.redis.host | default "magda-redis-master" }}{{ else }}{{ get $redis "host" | default "magda-redis-master" }}{{ end }}'
          - "--redisPort"
          - '{{ if (get $redis "enabled" | default true) }}{{ .Values.redis.port | default 6379 }}{{ else }}{{ get $redis "port" | default 6379 }}{{ end }}'
          - "--redisDb"
          - '{{ if (get $redis "enabled" | default true) }}{{ .Values.redis.db | default 0 }}{{ else }}{{ get $redis "db" | default 0 }}{{ end }}'
 {{ if (get $global "enableLivenessProbes") }}
        livenessProbe:
          httpGet:
            path: /v0/status/live
            port: {{ .Values.semanticSearchConfig.listenPort }}
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /v0/status/ready
            port: {{ .Values.semanticSearchConfig.listenPort }}
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 10
{{ end }}
        resources:
{{ toYaml .Values.resources | indent 10 }}
        env:
        - name: NODE_ENV
          value: production
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: auth-secrets
              key: jwt-secret
        {{ if (get $redis "passwordSecret") }}
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ get $redis "passwordSecret" }}
              key: redis-password
        {{ end }}
